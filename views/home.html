<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/home.css">
    </head>
    <body>
        <div class="home-container">
            <div class="list-section">
                <h2>Uploaded Songs</h2>
                <div id="song-search">
                    <input id="song-search-input" type="text" placeholder="Search Song..."/>
                </div>
                
                <div id="drop-zone" class="drop-zone">
                    <span>Drag and drop audio files here or click to select</span>
                    <button id="file-select" style="display: none;">Select Files</button>
                    <!-- Click now triggers native OS file picker via IPC -->
                </div>

                <div id="songlist-container" class="scrollable-list">
                    <!-- Song items will be dynamically added here -->
                </div>
            </div>
            
            <div class="viewer-section">
                <!-- 3D Cassette viewer will go here -->
                <div id="cassette-3d-viewer">
                    <div class="cassette-3d-container">
                        <div class="cassette-3d-model" id="cassette-3d-model">
                            <!-- Background cover image (if any) -->
                            <img id="cassette-cover-image" src="" class="cassette-cover" style="display: none;">
                            <!-- Foreground cassette template with transparent window -->
                            <img src="../images_original/SmallCustomCassetteTemplate.png" class="cassette-template" alt="Cassette Template">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Loading Screen Overlay -->
        <div id="loading-screen" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <p id="loading-text">Processing...</p>
        </div>
    </body>
</html>
