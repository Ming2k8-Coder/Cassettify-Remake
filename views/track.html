<div class="track-container">
    <h3>Beat Tracking & BPM</h3>

    <!-- Controls Row -->
    <div class="track-controls-row">
        <div class="track-control-group">
            <label>Mode</label>
            <div class="btn-group">
                <button id="btn-mode-auto" class="btn-toggle active">Auto Detect</button>
                <button id="btn-mode-constant" class="btn-toggle">Constant BPM</button>
            </div>
        </div>
        <div class="track-control-group" id="constant-bpm-panel" style="display:none;">
            <label>BPM</label>
            <input type="number" id="bpm-input" placeholder="120" min="30" max="320" step="0.1">
            <label>Start Offset (ms)</label>
            <input type="number" id="offset-input" placeholder="0" min="0" step="1">
        </div>
        <div class="track-control-group">
            <label>BPM Range Filter</label>
            <input type="number" id="bpm-min" placeholder="Min: 60" min="30" max="250" style="width:80px;">
            <span>–</span>
            <input type="number" id="bpm-max" placeholder="Max: 180" min="60" max="320" style="width:80px;">
        </div>
        <button id="btn-detect-bpm" class="btn-primary">⚡ Find Beats</button>
    </div>

    <!-- Waveform Panel -->
    <div class="waveform-panel" id="waveform-panel">
        <div id="waveform-loading" style="display:none; text-align:center; padding:40px; color: #aaa;">
            <div class="spinner"></div>
            Loading waveform...
        </div>
        <div id="waveform"></div>
        <div id="waveform-timeline"></div>
    </div>

    <!-- Playback Controls -->
    <div class="playback-bar">
        <button id="btn-play-preview" class="btn-icon" title="Play/Pause">▶</button>
        <span id="playback-time">0:00 / 0:00</span>
        <span id="bpm-display" style="margin-left: auto; color: #4a9eff; font-weight: bold;"></span>
        <button id="btn-clear-beats" class="btn-secondary btn-sm">Clear Beats</button>
    </div>

    <!-- Beat Detection Progress -->
    <div id="beat-progress" style="display:none;">
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="beat-progress-fill"></div>
        </div>
        <p id="beat-progress-label">Detecting beats...</p>
    </div>
    
    <!-- Beat Stats -->
    <div class="beat-stats" id="beat-stats" style="display:none;">
        <div class="stat-chip" id="stat-total-beats"></div>
        <div class="stat-chip" id="stat-bpm"></div>
        <div class="stat-chip" id="stat-duration"></div>
    </div>
</div>
