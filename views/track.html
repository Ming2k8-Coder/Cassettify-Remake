<div class="track-container" style="padding: 20px 40px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; height: 100%;">
    <!-- Top Row: Config & Controls (Glass Cards) -->
    <div style="display: flex; gap: 20px; width: 100%;">
        <!-- Mode & Parameters -->
        <div class="card-glass" style="flex: 2; padding: 20px;">
            <h4 style="margin-top: 0; color: var(--accent-color); margin-bottom: 12px;">Beat Detection Mode</h4>
            <div class="track-controls-row" style="background: none; padding: 0; display: flex; gap: 20px; align-items: flex-end; border-radius: 0;">
                <div class="track-control-group">
                    <label>Mode</label>
                    <div class="btn-group">
                        <button id="btn-mode-auto" class="btn-toggle active">Auto Detect</button>
                        <button id="btn-mode-constant" class="btn-toggle">Constant BPM</button>
                    </div>
                </div>
                
                <div class="track-control-group" id="constant-bpm-panel" style="display:none;">
                    <div style="display: flex; gap: 10px;">
                        <div>
                            <label>BPM</label>
                            <input type="number" id="bpm-input" placeholder="120" min="30" max="320" step="0.1" style="width: 80px; padding: 7px 10px; background: rgba(0,0,0,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 6px;">
                        </div>
                        <div>
                            <label>Start Offset (ms)</label>
                            <input type="number" id="offset-input" placeholder="0" min="0" step="1" style="width: 100px; padding: 7px 10px; background: rgba(0,0,0,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 6px;">
                        </div>
                    </div>
                </div>
                
                <div class="track-control-group" id="auto-bpm-panel">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div>
                            <label>Min BPM</label>
                            <input type="number" id="bpm-min" placeholder="60" min="30" max="250" style="width:80px; padding: 7px 10px; background: rgba(0,0,0,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 6px;">
                        </div>
                        <span style="color: #aaa; padding-top: 15px;">–</span>
                        <div>
                            <label>Max BPM</label>
                            <input type="number" id="bpm-max" placeholder="180" min="60" max="320" style="width:80px; padding: 7px 10px; background: rgba(0,0,0,0.2); color: white; border: 1.5px solid rgba(255,255,255,0.15); border-radius: 6px;">
                        </div>
                    </div>
                </div>
                
                <button id="btn-detect-bpm" class="btn-primary" style="height: 38px;">⚡ Find Beats</button>
            </div>
        </div>

        <!-- Metronome & Visual Indicator -->
        <div class="card-glass" style="flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
            <h4 style="margin: 0; color: var(--accent-color); font-size: 0.9em; text-transform: uppercase;">Beat Monitor</h4>
            <!-- Pulse Circle -->
            <div id="beat-flash-indicator" class="beat-pulse-circle"></div>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85em; font-family: 'Quicksand'; margin-top: 5px; user-select: none;">
                <input type="checkbox" id="chk-metronome" checked style="width: 15px; height: 15px; cursor: pointer;"> Metronome Audio
            </label>
        </div>
    </div>

    <!-- Waveform Display (Glass Card) -->
    <div class="card-glass" style="padding: 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0;">
        <div class="waveform-panel" id="waveform-panel" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: center;">
            <div id="waveform-loading" style="display:none; text-align:center; padding:20px; color: #aaa;">
                <div class="spinner"></div>
                Loading waveform...
            </div>
            <div id="waveform"></div>
            <div id="waveform-timeline"></div>
        </div>

        <!-- Playback Controls -->
        <div class="playback-bar" style="display: flex; align-items: center; gap: 15px;">
            <button id="btn-play-preview" class="btn-primary btn-play-circle" style="width: 100px; font-size: 0.9em; padding: 8px 16px;">▶ Play</button>
            <span id="playback-time" style="color: #aaa; font-size: 0.9em; font-family: 'Quicksand';">0:00 / 0:00</span>
            <span id="bpm-display" style="margin-left: auto; color: var(--accent-color); font-weight: bold; font-family: 'Quicksand'; font-size: 1.1em;"></span>
            <button id="btn-clear-beats" class="btn-secondary btn-sm" style="height: 34px;">Clear Beats</button>
        </div>
    </div>

    <!-- Beat Detection Progress -->
    <div id="beat-progress" style="display:none; margin-top: 5px;">
        <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="beat-progress-fill"></div>
        </div>
        <p id="beat-progress-label" style="font-family: 'Quicksand'; margin: 5px 0 0 0;">Detecting beats...</p>
    </div>
    
    <!-- Beat Stats -->
    <div class="beat-stats" id="beat-stats" style="display:none; margin-top: 5px; display: flex; gap: 10px;">
        <div class="stat-chip" id="stat-total-beats"></div>
        <div class="stat-chip" id="stat-bpm"></div>
        <div class="stat-chip" id="stat-duration" style="font-family: 'Quicksand';"></div>
    </div>
</div>
